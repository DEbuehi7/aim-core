<!DOCTYPE html><html>
<head>
<title>AIM Core</title>
</head>
<body>

<h1>AIM CORE UI</h1>

<button onclick="runDeal()">Run Deal Engine</button>

<pre id="output"></pre>

<script>
async function runDeal() {
try {
alert("Running...");

const res = await fetch('https://aim-core-api.onrender.com/api/deal-flow/run');

const text = await res.text();
document.getElementById('output').textContent = text;

} catch (err) {
alert("ERROR: " + err.message);
}
}
</script>

</body>
</html>

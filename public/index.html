<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>AIM Core</title>
</head>
<body>

<h1>AIM CORE UI</h1>

<button onclick="runDeal()">Run Deal Engine</button>

<pre id="output"></pre>

<script>
async function runDeal() {
const res = await fetch('/api/deal-flow/run');
const data = await res.json();
document.getElementById('output').textContent =
JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
